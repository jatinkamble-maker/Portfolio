<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced CSS Animations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
</head>
<style>
    body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to left, #667eea, #764ba2);
    text-align: center;
}
.main{
        
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 30px;
    }
    .card{
        width: 260px;
        background: linear-gradient(to right, yellow, #01651c);
        border-radius: 25px;
        padding: 20px;
        border: 5px solid skyblue;
        transition: all 0.2s ease;
    }
    .card:hover{
        transform: translate(5px,-5px);
        box-shadow: 5px 5px 10px green;
    }
    .slide-card{
        animation: slideIn 2s ease-in-out infinite;
    }
    @keyframes slideIn{
        from{
            transform: translateX(-100%);
        }
        to{
            transform: translateX(0);
        }
    }
    h1{
        transition: all 0.3s ease;
    }
    h1:hover{
        transform: translateY(-5px);
        color: green;
        box-shadow: 5px 5px 15px red;
    }
    button{
        background-color: skyblue;
        transition: all 0.3s ease;
        border-radius: 10px;
        font-weight: bold;
        color: black;

    }
    button:hover{
        background-color: purple;
        transform: translate(5px,-5px);
        box-shadow: 5px 5px 10px black;
        color: whitesmoke;
    }
    .bounce-card{
        animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
        0%{
            transform: translateY(0);
        }
        100%{
            transform: translateY(-20px);
        }
    }
    .rotate-card{
        animation: rotate 4s ease-out infinite;
    }
    @keyframes rotate {
        from{
            transform: rotate(0deg);
        }
        to{
            transform: rotate(360deg);
        }
    }
    .pulse-card{
        animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
        0%{
            transform: scale(1);opacity: 1;
        }
        50%{
            transform: scale(1.2);opacity: 0.7;
        }
        100%{
            transform: scale(1);opacity: 1;
        }
    }
    .loader{
        height: 50px;
        width: 50px;
        border: 5px solid blue;
        border-radius: 50%;
        margin: auto;
        border-top: 5px solid red
        ;
        animation: spin 1s ease infinite;
    }
    @keyframes spin {
        0%{
            transform: rotate(0deg);
        }
        100%{
            transform: rotate(360deg);
        }
    }
    .disappear-card{
        animation: disappear 2s ease-in-out infinite;
    }
    @keyframes disappear {
        0%{
            opacity: 1;
        }
        50%{
            opacity: 0;
        }
        100%{
            opacity: 1;
        }
    }

</style>
<body>
<h1>
    Animation Examples
</h1>
<div class="main">
    <div class = "card slide-card">
        <h2>card</h2>
        <button>Click Me</button>
    </div>
    <div class = "card bounce-card">
        <h2>bounce card</h2>
        <button>Click Me</button>
    </div>
    <div class = "card rotate-card">
        <h2>rotate card</h2>
        <button>Click Me</button>
    </div>
    <div class = "card pulse-card">
        <h2>pulse card</h2>
        <button>Click Me</button>
    </div>
    <div class="card">
    <div class = "loader"></div>
        <h2>loader card</h2>
        <button>Click Me</button>
    </div>
    <div class = "card disappear-card">
        <h2>Disappear card</h2>
        <button>Click Me</button>
    </div>

</div>
</body>
</html>
