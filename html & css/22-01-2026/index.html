<!DOCTYPE html>
<html lang="en">
<head>
    <title>Application Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <h2>Student Admission Form</h2>
        <fieldset>
            <legend>Personal Details</legend>
            <label>Full Name</label>
            <input type="text" autofocus placeholder="Enter full name " required>
            <label>Email</label>
            <input type="email" placeholder="Enter email" required>
            <label>Password</label>
            <input type="password" placeholder="Enter password" required>
            <label>Moblie Number</label>
            <input type="tel" pattern="[0-9](10)" placeholder="Enter ph.no" required>
            <label>Date Of Birth</label>
            <input type="date">
            <label>Age</label>
            <input type="number" min="17" max="60">
        </fieldset>
        <fieldset>
            <legend>Academic Details</legend>
            <label>Course</label>
            <select required>
                <option value="">Select</option>
                <option >B.Tech</option>
                <option>BCA</option>
                <option>MBA</option>
                <option>M.Tech</option>
            </select>
            <label>Branch</label>
            <input type="text" list="branches">
            <datalist id="branches">
                <option>CSE</option>
                <option>AIDS</option>
                <option>ECE</option>
                <option>Arts & Science</option>
            </datalist>
            <label>Percentage</label>
            <input type="range" min="40" max="99">
        </fieldset>
        <fieldset>
            <legend>Preferences</legend>
            <label>Gender</label>
            <input type="radio" name="gender">Male
            <input type="radio" name="gender">Female<br>
            <label>Languages Known</label>
            <input type="checkbox">Telugu
            <input type="checkbox">Hindi
            <input type="checkbox">English<br>
            <label>Upload Photo</label>
            <input type="file">
            <label>Comments</label>
            <textarea rows="5"></textarea>
        </fieldset>
        <button>Submit</button>
        <button>Cancle</button>

    </form>
</body>
</html>
