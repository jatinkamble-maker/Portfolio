<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial,sans-serif;
            background-color: #ced8e7;
            margin: 0;
            padding: 20px;
        }
        h1{
            text-align: center;
            color: #333;
        }
        section{
            background-color: whitesmoke;
            padding: 15px;
            margin: 20px auto;
            max-width: 700px;
            border-radius: 8px;
            box-shadow: 0 0 10px #ccc;
            text-align: center;
        }
        img:hover{
            transform: scale(1.09);
            transition: transform 0.3s ease;
        }
        audio:hover{
        transform: scale(1.1);
        transition: transform 0.3s ease;
        }
        video:hover{
        transform: scale(1.09);
        transition: transform 0.3s ease;
        }
    </style>
</head>
<body>
    <div>
    <h1>Learn Geetha Online</h1>
    </div>
    <section>
        <h2>Sri Krishna</h2>
        <figure>
            <img src="image (8).png" alt="Sri Krishna" width="500">
            <figcaption>Sri Krishna</figcaption>
        </figure>
    </section>
    <!--Audio Section-->
    <section>
        <h2>Audio Media</h2>
        <audio controls src="geetha.mp4" type="audio/mpeg">
            Your browser does not support audio.
        </audio>
    </section>
    <!--Video Section-->
    <section>
        <h2>Video Media</h2>
        <video controls width="400" poster="krishna1.jpeg" src="krishnadance.mp4">
            Your browser does not support video.
        </video>
    </section>
    <!--PDF Using Embed-->
    <section>
        <h2>Embedded PDF</h2>
        <embed src="sample.pdf" type="application/pdf" width="100%" height="500">
    </section>
    <section>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/g883CDeZtBA?si=dLq-TAdWWhZ4qoVb" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </section>
</body>
</html>
