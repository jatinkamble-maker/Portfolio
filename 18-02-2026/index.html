<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background: linear-gradient(to top, green,yellow);
            margin: 0;
            text-align: center;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-weight: bold;
            height: 100vh;
            font-size: 35px;
            color: green;
        }
        label{
            font-size: 80px;
            padding: 10px;
            margin: 5px;
        }
        button{
            border-radius: 10px;
            width: 80px;
            height: 30px;
            padding: 10px;
            margin: 10px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 15px;
            font-weight: bold;
            color: black;
            background-color: lightblue;
            transition: all 0.3s ease;

        }
        button:hover{
            transform: scale(1.2);
            box-shadow: 2px 2px 2px gray;
            background-color:cadetblue;
        }
    </style>

</head>
<body>
    <h1>Counter</h1>
    <label id="number">0</label>
    <div>
        <button id="rise">Rise</button>
        <button id="clear">Clear</button>
        <button id="down">Down</button>
    </div>
    <p id="message">

    </p>
    <script>
        const lablevalue = document.getElementById("number");
        const raisebtn = document.getElementById("rise");
        const clearbtn = document.getElementById("clear");
        const downbtn = document.getElementById("down");
        let count = 0;
        raisebtn.onclick = function() {
            count++;
            lablevalue.textContent = count;
            message.textContent = "counter incrementation";
        }
        clearbtn.onclick = function() {
            count = 0;
            lablevalue.textContent = count;
            message.textContent = "counter clear";
        }
        downbtn.onclick = function() {
            count--;
            lablevalue.textContent = count;
            message.textContent = "counter decremtation";
        }
</script>
</body>
</html>
